<!DOCTYPE html>
<html>
<head>
    <title>Simple Takeout Board</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 40px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        .stat { margin: 10px 0; font-size: 1.2em; }
        .progress-bg { background: #444; height: 20px; border-radius: 10px; overflow: hidden; }
        .progress-fg { background: #4caf50; height: 100%; width: 0%; transition: width 0.5s; }
        .label { color: #888; font-size: 0.8em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Takeout Downloader</h2>
        <div class="stat"><span class="label">Batch:</span> <span id="batch">--</span></div>
        <div class="stat"><span class="label">Part:</span> <span id="part">0</span> / <span id="total">0</span></div>
        <div class="stat"><span class="label">Phase:</span> <span id="phase">IDLE</span></div>
        <div class="stat"><span class="label">File:</span> <span id="file">--</span></div>
        <div class="stat"><span class="label">Speed:</span> <span id="speed">0 MB/s</span></div>
        <div class="stat">
            <span class="label">Progress:</span> <span id="progress-text">0%</span>
            <div class="progress-bg"><div id="progress-bar" class="progress-fg"></div></div>
        </div>
    </div>
    <script>
        function update() {
            fetch('status_simple.json')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('batch').textContent = data.batch;
                    document.getElementById('part').textContent = data.part;
                    document.getElementById('total').textContent = data.total_parts;
                    document.getElementById('phase').textContent = data.phase;
                    document.getElementById('file').textContent = data.file;
                    document.getElementById('speed').textContent = data.speed;
                    document.getElementById('progress-text').textContent = data.progress;
                    document.getElementById('progress-bar').style.width = data.progress;
                })
                .catch(() => {});
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
