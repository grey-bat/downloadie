<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takeout Turbo v3.2</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #a855f7;
            --accent-secondary: #3b82f6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 24px; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .logo-group { display: flex; align-items: center; gap: 16px; }
        .logo-group img { width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .stat-value { font-size: 1.75rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 24px; min-height: 500px; }
        .section { background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .section-title { font-size: 1rem; margin-top: 0; margin-bottom: 24px; color: var(--text-dim); font-weight: 600; display: flex; justify-content: space-between; }
        
        .pipeline-item { background: rgba(15, 23, 42, 0.5); padding: 24px; border-radius: 12px; border-left: 4px solid var(--accent-primary); margin-bottom: 20px; }
        .pipeline-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .pipeline-name { font-weight: 700; font-size: 1.25rem; color: var(--text-main); }
        .pipeline-status { font-size: 0.75rem; background: var(--accent-primary); color: white; padding: 4px 12px; border-radius: 99px; font-weight: 700; }
        
        .progress-container { margin: 20px 0; }
        .progress-bar-bg { background: rgba(255,255,255,0.05); border-radius: 12px; height: 16px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
        .progress-details { display: flex; justify-content: space-between; font-size: 0.875rem; margin-top: 12px; color: var(--text-dim); }
        
        .event-log { height: 450px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--accent-primary) transparent; }
        .log-entry { margin-bottom: 12px; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.1); border-left: 3px solid transparent; }
        .log-entry.success { border-left-color: var(--success); }
        .log-entry.error { border-left-color: var(--error); }
        .log-entry.info { border-left-color: var(--accent-secondary); }
        .log-time { color: var(--text-dim); font-size: 0.75rem; display: block; margin-bottom: 4px; }
        .log-msg { font-size: 0.85rem; color: #e2e8f0; }
        
        .chart-container { height: 250px; margin-top: 24px; }
        #connection-status { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-group">
                <img src="icon.png" alt="Logo">
                <div>
                    <h1 style="margin:0; font-size: 1.5rem; letter-spacing: -0.02em;">Takeout Turbo <span style="color: var(--accent-primary)">v3.2</span></h1>
                    <div id="system-time" style="font-size: 0.75rem; color: var(--text-dim); margin-top: 2px;">--:--:--</div>
                </div>
            </div>
            <div id="connection-status">PIPELINE ACTIVE</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Throughput</div>
                <div id="total-speed" class="stat-value" style="color: var(--accent-primary)">0.0 MB/s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Progress</div>
                <div id="total-progress" class="stat-value">0 / 114</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Data Processed</div>
                <div id="total-data" class="stat-value">0.0 GB</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Global ETA</div>
                <div id="global-eta" class="stat-value" style="color: var(--accent-secondary)">--</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <section class="section">
                    <h2 class="section-title">Pipeline Stages</h2>
                    <div id="pipeline-container">
                        <!-- Active Download -->
                        <div id="dl-stage" class="pipeline-item">
                            <div class="pipeline-info">
                                <div>
                                    <div id="dl-name" class="pipeline-name">--</div>
                                    <div class="text-dim" style="font-size: 0.85rem; margin-top: 4px;">Phase 1: Downloading from Google to SSD</div>
                                </div>
                                <div id="dl-phase" class="pipeline-status">IDLE</div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar-bg">
                                    <div id="dl-fill" class="progress-bar-fill" style="width: 0%"></div>
                                </div>
                                <div class="progress-details">
                                    <span id="dl-percent">0%</span>
                                    <span id="dl-bytes">-- / --</span>
                                </div>
                            </div>
                        </div>

                        <!-- Active Extraction -->
                        <div id="ex-stage" class="pipeline-item" style="border-left-color: var(--success)">
                            <div class="pipeline-info">
                                <div>
                                    <div id="ex-name" class="pipeline-name">--</div>
                                    <div class="text-dim" style="font-size: 0.85rem; margin-top: 4px;">Phase 2: Unzipping from SSD to HDD (Flattened)</div>
                                </div>
                                <div id="ex-phase" class="pipeline-status" style="background: var(--success)">IDLE</div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar-bg">
                                    <div id="ex-fill" class="progress-bar-fill" style="width: 0%; background: linear-gradient(90deg, var(--success), #34d399);"></div>
                                </div>
                                <div class="progress-details">
                                    <span id="ex-percent">0%</span>
                                    <span id="ex-bytes">-- / --</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-container">
                        <canvas id="speedChart"></canvas>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <section class="section">
                    <h2 class="section-title">Event Log</h2>
                    <div id="system-log" class="event-log">
                        <div style="text-align: center; color: var(--text-dim); padding: 20px;">Waiting for activity...</div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        let speedChart;
        const MAX_HISTORY = 60;
        const speedHistory = Array(MAX_HISTORY).fill(0);

        function initChart() {
            const ctx = document.getElementById('speedChart').getContext('2d');
            speedChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(MAX_HISTORY).fill(''),
                    datasets: [{
                        label: 'Speed (MB/s)',
                        data: speedHistory,
                        borderColor: '#a855f7',
                        backgroundColor: 'rgba(168, 85, 247, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8', font: { size: 10 } }
                        }
                    }
                }
            });
        }

        async function updateDashboard() {
            try {
                const res = await fetch('status.json?t=' + Date.now());
                if (!res.ok) return;
                const data = await res.json();

                document.getElementById('system-time').innerText = data.time || '--:--:--';
                document.getElementById('total-progress').innerText = `${data.processed_count || 0} / 114`;
                document.getElementById('total-data').innerText = `${(data.total_gb_processed || 0).toFixed(1)} GB`;
                
                // Speed and Chart
                const currentSpeed = (data.dl_speed || 0) + (data.ex_speed || 0);
                document.getElementById('total-speed').innerText = `${currentSpeed.toFixed(1)} MB/s`;
                if (speedChart) {
                    speedChart.data.datasets[0].data.push(currentSpeed);
                    speedChart.data.datasets[0].data.shift();
                    speedChart.update('none');
                }

                // Download Card
                document.getElementById('dl-name').innerText = data.dl_name || '--';
                document.getElementById('dl-phase').innerText = data.dl_phase || 'IDLE';
                document.getElementById('dl-percent').innerText = `${data.dl_pct || 0}%`;
                document.getElementById('dl-fill').style.width = `${data.dl_pct || 0}%`;
                
                const dlGB = (data.dl_bytes || 0) / 1073741824;
                const dlTotalGB = (data.dl_total_bytes || 0) / 1073741824;
                document.getElementById('dl-bytes').innerText = `${dlGB.toFixed(1)}GB / ${dlTotalGB.toFixed(1)}GB`;

                // Extraction Card
                document.getElementById('ex-name').innerText = data.ex_name || '--';
                document.getElementById('ex-phase').innerText = data.ex_phase || 'IDLE';
                document.getElementById('ex-percent').innerText = `${data.ex_pct || 0}%`;
                document.getElementById('ex-fill').style.width = `${data.ex_pct || 0}%`;
                
                const exGB = (data.ex_bytes || 0) / 1073741824;
                const exTotalGB = (data.ex_total_bytes || 0) / 1073741824;
                document.getElementById('ex-bytes').innerText = `${exGB.toFixed(1)}GB / ${exTotalGB.toFixed(1)}GB`;
                
                document.getElementById('global-eta').innerText = data.ex_eta || data.dl_eta || '--';

            } catch (e) { console.error(e); }
        }

        async function updateLogs() {
            try {
                const res = await fetch('activity.json?t=' + Date.now());
                if (!res.ok) return;
                const logs = await res.json();
                const container = document.getElementById('system-log');
                
                if (logs && logs.length > 0) {
                    container.innerHTML = logs.map(log => `
                        <div class="log-entry ${log.type}">
                            <span class="log-time">${log.time}</span>
                            <span class="log-msg">${log.msg}</span>
                        </div>
                    `).join('');
                }
            } catch (e) { }
        }

        initChart();
        setInterval(updateDashboard, 2000);
        setInterval(updateLogs, 3000);
        updateDashboard();
        updateLogs();
    </script>
</body>
</html>
