<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takeout Turbo Dashboard</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #a855f7;
            --accent-secondary: #3b82f6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; padding: 32px; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-group { display: flex; align-items: center; gap: 20px; }
        .logo-group img { width: 56px; height: 56px; border-radius: 14px; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4); border: 1px solid rgba(255,255,255,0.1); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: linear-gradient(145deg, var(--card-bg), rgba(30, 41, 59, 0.8)); padding: 28px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 100px; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02)); transform: skewX(-45deg); }
        .stat-card:hover { transform: translateY(-4px); border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
        .stat-label { color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 12px; }
        .stat-value { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        
        .main-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 32px; }
        @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } }
        
        .section { background: var(--card-bg); border-radius: 24px; padding: 32px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .section-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 28px 0; display: flex; align-items: center; gap: 12px; letter-spacing: -0.01em; }
        .section-title::before { content: ''; display: block; width: 6px; height: 20px; background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary)); border-radius: 4px; }
        
        .pipeline-item { border-left: 3px solid rgba(255,255,255,0.05); padding-left: 28px; margin-bottom: 32px; position: relative; transition: all 0.3s ease; }
        .pipeline-item:hover { border-left-color: rgba(255,255,255,0.2); }
        .pipeline-item::before { content: ''; position: absolute; left: -8px; top: 4px; width: 13px; height: 13px; border-radius: 50%; background: var(--accent-primary); box-shadow: 0 0 15px var(--accent-primary); border: 2px solid var(--card-bg); }
        .pipeline-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .pipeline-name { font-weight: 700; font-size: 1.25rem; color: #fff; margin-bottom: 4px; }
        .pipeline-status { padding: 6px 16px; border-radius: 99px; font-size: 0.8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-primary), #c084fc); color: #fff; letter-spacing: 0.08em; text-transform: uppercase; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
        
        .progress-container { margin-top: 16px; }
        .progress-bar-bg { height: 12px; background: rgba(0,0,0,0.4); border-radius: 6px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary), #c084fc); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 6px; box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); }
        .progress-details { display: flex; justify-content: space-between; font-size: 0.95rem; color: var(--text-dim); margin-top: 12px; font-variant-numeric: tabular-nums; font-weight: 500; }

        .event-log { height: 550px; overflow-y: auto; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.9rem; padding-right: 12px; }
        .event-log::-webkit-scrollbar { width: 8px; }
        .event-log::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .event-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .event-log::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        .log-entry { padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 16px; background: rgba(0,0,0,0.25); border-left: 4px solid transparent; transition: background 0.2s; align-items: center; }
        .log-entry:hover { background: rgba(255,255,255,0.05); }
        .log-entry.info { border-left-color: var(--accent-secondary); }
        .log-entry.success { border-left-color: var(--success); }
        .log-entry.error { border-left-color: var(--error); }
        .log-entry.warning { border-left-color: var(--warning); }
        .log-time { color: var(--text-dim); white-space: nowrap; font-size: 0.8rem; font-weight: 600; opacity: 0.8; }
        .log-msg { font-size: 0.9rem; color: #f1f5f9; line-height: 1.4; }
        
        .chart-container { height: 300px; margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        #connection-status { background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05)); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); padding: 8px 20px; border-radius: 99px; font-size: 0.85rem; font-weight: 800; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        #connection-status::before { content: ''; display: block; width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-group">
                <img src="icon.png" alt="Logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0OCIgaGVpZ2h0PSI0OCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNhODU1ZjciIHN0cm9rZS13aWR0aD0iMiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTIxIDE1djRhMiAyIDAgMCAxLTIgMkg1YTIgMiAwIDAgMS0yLTJ2LTQiPjwvcGF0aD48cG9seWxpbmUgcG9pbnRzPSI3IDEwIDEyIDE1IDE3IDEwIj48L3BvbHlsaW5lPjxsaW5lIHgxPSIxMiIgeTE9IjE1IiB4Mj0iMTIiIHkyPSIzIj48L2xpbmU+PC9zdmc+'">
                <div>
                    <h1 style="margin:0; font-size: 1.8rem; letter-spacing: -0.02em;">Takeout Turbo Dashboard</h1>
                    <div id="system-time" style="font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; font-weight: 500;">--:--:--</div>
                </div>
            </div>
            <div id="connection-status">PIPELINE ACTIVE</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Throughput</div>
                <div id="total-speed" class="stat-value" style="color: var(--accent-primary)">0.0 MB/s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Progress</div>
                <div id="total-progress" class="stat-value">0 / 3</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Global ETA</div>
                <div id="global-eta" class="stat-value" style="color: var(--accent-secondary)">--</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <section class="section">
                    <h2 class="section-title">Pipeline Stages</h2>
                    <div id="pipeline-container">
                        <!-- Active Download -->
                        <div id="dl-stage" class="pipeline-item">
                            <div class="pipeline-info">
                                <div>
                                    <div id="dl-name" class="pipeline-name">--</div>
                                    <div class="text-dim" style="font-size: 0.9rem; margin-top: 6px;">Phase 1: Downloading from Google to SSD</div>
                                </div>
                                <div id="dl-phase" class="pipeline-status">IDLE</div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar-bg">
                                    <div id="dl-fill" class="progress-bar-fill" style="width: 0%"></div>
                                </div>
                                <div class="progress-details">
                                    <span id="dl-percent">0%</span>
                                    <span id="dl-bytes"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Active Extraction -->
                        <div id="ex-stage" class="pipeline-item" style="border-left-color: var(--success)">
                            <div class="pipeline-info">
                                <div>
                                    <div id="ex-name" class="pipeline-name">--</div>
                                    <div class="text-dim" style="font-size: 0.9rem; margin-top: 6px;">Phase 2: Unzipping from SSD to HDD / Immich Ingest</div>
                                </div>
                                <div id="ex-phase" class="pipeline-status" style="background: linear-gradient(135deg, var(--success), #34d399);">IDLE</div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar-bg">
                                    <div id="ex-fill" class="progress-bar-fill" style="width: 0%; background: linear-gradient(90deg, var(--success), #34d399);"></div>
                                </div>
                                <div class="progress-details">
                                    <span id="ex-percent">0%</span>
                                    <span id="ex-bytes"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-container">
                        <canvas id="speedChart"></canvas>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <section class="section">
                    <h2 class="section-title">Event Log</h2>
                    <div id="system-log" class="event-log">
                        <div style="text-align: center; color: var(--text-dim); padding: 40px; font-weight: 500;">Waiting for activity...</div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        let speedChart;
        const MAX_HISTORY = 60;
        const speedHistory = Array(MAX_HISTORY).fill(0);

        function initChart() {
            const ctx = document.getElementById('speedChart').getContext('2d');
            speedChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(MAX_HISTORY).fill(''),
                    datasets: [{
                        label: 'Speed (MB/s)',
                        data: speedHistory,
                        borderColor: '#a855f7',
                        backgroundColor: 'rgba(168, 85, 247, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8', font: { size: 11, family: 'Inter' } }
                        }
                    }
                }
            });
        }

        async function updateDashboard() {
            try {
                const res = await fetch('status.json?t=' + Date.now());
                if (!res.ok) return;
                const data = await res.json();

                document.getElementById('system-time').innerText = data.time || '--:--:--';
                document.getElementById('total-progress').innerText = `${data.processed_count || 0} / 3`;
                
                // Speed and Chart
                const currentSpeed = (data.dl_speed || 0);
                document.getElementById('total-speed').innerText = `${currentSpeed.toFixed(1)} MB/s`;
                if (speedChart) {
                    speedChart.data.datasets[0].data.push(currentSpeed);
                    speedChart.data.datasets[0].data.shift();
                    speedChart.update('none');
                }

                // Download Card
                document.getElementById('dl-name').innerText = data.dl_name || '--';
                document.getElementById('dl-phase').innerText = data.dl_phase || 'IDLE';
                document.getElementById('dl-percent').innerText = `${data.dl_pct || 0}%`;
                document.getElementById('dl-fill').style.width = `${data.dl_pct || 0}%`;

                // Extraction Card
                document.getElementById('ex-name').innerText = data.ex_name || '--';
                document.getElementById('ex-phase').innerText = data.ex_phase || 'IDLE';
                document.getElementById('ex-percent').innerText = `${data.ex_pct || 0}%`;
                document.getElementById('ex-fill').style.width = `${data.ex_pct || 0}%`;

            } catch (e) { console.error(e); }
        }

        async function updateLogs() {
            try {
                const res = await fetch('activity.json?t=' + Date.now());
                if (!res.ok) return;
                const logs = await res.json();
                const container = document.getElementById('system-log');
                
                if (logs && logs.length > 0) {
                    container.innerHTML = logs.map(log => `
                        <div class="log-entry ${log.type}">
                            <span class="log-time">${log.time}</span>
                            <span class="log-msg">${log.msg}</span>
                        </div>
                    `).join('');
                }
            } catch (e) { }
        }

        initChart();
        setInterval(updateDashboard, 1500);
        setInterval(updateLogs, 3000);
        updateDashboard();
        updateLogs();
    </script>
</body>
</html>
